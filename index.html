<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏰 프로즌 레거시 (Frozen Legacy)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

:root {
  --ice: #a8d8f0;
  --ice-bright: #e0f4ff;
  --ice-dark: #4a9fc4;
  --gold: #f0c060;
  --gold-bright: #ffe080;
  --fire: #ff6030;
  --fire-bright: #ff9060;
  --bg-deep: #0a0e1a;
  --bg-mid: #111828;
  --bg-panel: #161e30;
  --bg-panel2: #1c2840;
  --hp-red: #e03040;
  --hp-green: #40c060;
  --text-main: #d0e4f8;
  --text-dim: #6080a0;
  --border: #2a3a58;
  --wave-dark: #080c14;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg-deep);
  color: var(--text-main);
  font-family: 'Crimson Text', serif;
  font-size: 15px;
  overflow: hidden;
  user-select: none;
}

#app {
  display: flex;
  flex-direction: column;
  width: 100vw;
  height: 100vh;
  max-height: 100vh;
}

/* ── TITLE SCREEN ── */
#title-screen {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 30%, #0d1f3a 0%, #050a12 70%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1000;
  gap: 20px;
}
#title-screen h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(32px, 6vw, 72px);
  font-weight: 900;
  color: var(--ice-bright);
  text-shadow: 0 0 30px var(--ice), 0 0 60px var(--ice-dark), 0 4px 8px #000;
  letter-spacing: 0.1em;
  text-align: center;
}
#title-screen .subtitle {
  font-family: 'Cinzel', serif;
  font-size: clamp(11px, 2vw, 16px);
  color: var(--ice);
  letter-spacing: 0.3em;
  opacity: 0.8;
}
.title-btn {
  margin-top: 20px;
  padding: 14px 48px;
  font-family: 'Cinzel', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--bg-deep);
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-bright) 50%, var(--gold) 100%);
  border: none; border-radius: 4px;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(240,192,96,0.5);
  transition: all 0.2s;
  letter-spacing: 0.1em;
}
.title-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(240,192,96,0.8); }

.snowflakes { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.sf {
  position: absolute;
  color: rgba(168,216,240,0.6);
  animation: sffall linear infinite;
  font-size: 16px;
}
@keyframes sffall {
  from { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  to { transform: translateY(105vh) rotate(360deg); opacity: 0.2; }
}

/* ── TOP BAR ── */
#topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 6px 12px;
  background: linear-gradient(90deg, var(--bg-panel) 0%, var(--bg-panel2) 100%);
  border-bottom: 2px solid var(--border);
  flex-shrink: 0;
  min-height: 44px;
}
.stat-box {
  display: flex; align-items: center; gap: 6px;
  background: var(--wave-dark);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 10px;
  font-size: 13px;
}
.stat-val { font-weight: 600; color: var(--gold); font-family: 'Cinzel', serif; }

#castle-hp-bar-wrap {
  flex: 1; max-width: 200px;
  display: flex; flex-direction: column; gap: 2px;
}
.bar-track {
  height: 10px; background: #0a1020; border-radius: 3px;
  border: 1px solid var(--border); overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.bar-fill.hp { background: linear-gradient(90deg, var(--hp-green), #60e080); }
.bar-fill.hp.low { background: linear-gradient(90deg, #c02020, var(--hp-red)); }

#wave-info {
  font-family: 'Cinzel', serif;
  font-size: 14px; font-weight: 700;
  color: var(--ice-bright);
  text-shadow: 0 0 10px var(--ice);
  margin-left: auto;
}

#btn-wave {
  padding: 6px 18px;
  font-family: 'Cinzel', serif; font-size: 13px; font-weight: 700;
  background: linear-gradient(135deg, #2a6040, #3a8050);
  color: #a0ffc0; border: 1px solid #3a8050; border-radius: 4px;
  cursor: pointer; transition: all 0.2s;
}
#btn-wave:hover { background: linear-gradient(135deg, #3a8050, #50a060); }
#btn-wave:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── MAIN AREA ── */
#main-area {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── GAME CANVAS ── */
#canvas-wrap {
  position: relative;
  flex: 1;
  overflow: hidden;
  background: #070d18;
}
canvas#game {
  display: block;
  cursor: crosshair;
}

/* ── RIGHT PANEL ── */
#right-panel {
  width: 260px; min-width: 260px;
  background: var(--bg-panel);
  border-left: 2px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}
.panel-section {
  padding: 10px;
  border-bottom: 1px solid var(--border);
}
.panel-title {
  font-family: 'Cinzel', serif;
  font-size: 12px; font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.1em;
  margin-bottom: 8px;
  text-transform: uppercase;
}

/* Info Box (신규 추가) */
#info-box {
  background: var(--wave-dark);
  border: 1px solid #3a4a68;
  border-radius: 4px;
  padding: 10px;
  min-height: 85px;
}
#info-content {
  font-size: 12px;
  line-height: 1.5;
  color: var(--text-dim);
}

/* Turret/Trap buttons */
.turret-grid, .trap-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
}
.item-btn {
  position: relative;
  padding: 8px 4px;
  background: var(--bg-panel2);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  color: var(--text-main);
}
.item-btn:hover { border-color: var(--ice); background: #1e2e48; }
.item-btn.selected { border-color: var(--gold); background: #2a2010; box-shadow: inset 0 0 8px rgba(240,192,96,0.3); }
.item-btn .t-icon { font-size: 22px; display: block; margin-bottom: 2px; }
.item-btn .t-name { font-size: 11px; color: var(--text-main); display: block; font-family:'Crimson Text',serif; font-weight:bold;}
.item-btn .t-cost { font-size: 12px; color: var(--gold); font-family:'Cinzel',serif; font-weight:700; margin-top: 2px; display: block;}

/* Action buttons */
#sel-repair-btn, #sel-sell-btn {
  width: 100%; padding: 8px; margin-top: 6px;
  font-family:'Cinzel',serif; font-size:12px; font-weight:700; border-radius: 4px;
  cursor: pointer; transition: all 0.2s;
}
#sel-repair-btn { background: linear-gradient(135deg, #4a2010, #6a3010); color: #ffb060; border: 1px solid #8a5020; }
#sel-sell-btn { background: transparent; color: var(--hp-red); border: 1px solid #602020; }

/* Upgrade buttons */
.upgrade-btn {
  width: 100%; padding: 8px; margin-bottom: 6px;
  background: var(--bg-panel2); border: 1px solid var(--border);
  color: var(--text-main); cursor: pointer; text-align: left;
  font-size: 12px; border-radius: 4px; transition: all 0.15s;
}
.upgrade-btn:hover { background: #253550; border-color: var(--ice-dark); }

/* ── BOTTOM BAR ── */
#bottombar {
  height: 30px; padding: 0 12px;
  background: var(--wave-dark);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: var(--ice);
  flex-shrink: 0;
}
#msg-log { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; font-weight: bold;}

/* ── OVERLAY ── */
#overlay-screen {
  display: none;
  position: fixed; inset: 0; z-index: 2000;
  background: rgba(5,10,20,0.92);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
#overlay-screen.show { display: flex; }
#overlay-screen h2.lose { color: var(--hp-red); }
#overlay-screen h2.win { color: var(--gold-bright); }
.overlay-btn { padding: 12px 40px; font-family: 'Cinzel'; background: #3a5080; color: white; border: none; cursor: pointer; font-size:16px; font-weight:bold; border-radius: 4px; }
</style>
</head>
<body>

<div id="title-screen">
  <div class="subtitle">⚔ FROZEN LEGACY ⚔</div>
  <h1>프로즌 레거시</h1>
  <button class="title-btn" onclick="startGame()">🏰 게임 시작</button>
</div>

<div id="app" style="display:none">
  <div id="topbar">
    <div class="stat-box" title="골드">💰 <span class="stat-val" id="stat-gold">400</span></div>
    <div class="stat-box" title="고대핵 (보스 처치 시 획득)">💎 <span class="stat-val" id="stat-core">0</span></div>
    <div class="stat-box" title="설치된 포탑 개수 (최대 12개)">🗼 <span class="stat-val" id="stat-turrets">0/12</span></div>
    
    <div id="castle-hp-bar-wrap">
      <div style="display:flex;justify-content:space-between;font-size:10px; font-weight:bold;">
        <span>CASTLE HP</span><span id="castle-hp-text">100%</span>
      </div>
      <div class="bar-track"><div class="bar-fill hp" id="castle-hp-bar" style="width:100%"></div></div>
    </div>
    
    <div id="wave-info">WAVE <span id="wave-num">0</span> / 100</div>
    <button id="speed-btn" onclick="toggleSpeed()">⏩ 1×</button>
    <button id="btn-wave" onclick="startWave()">▶ 웨이브 시작</button>
  </div>

  <div id="main-area">
    <div id="canvas-wrap">
      <canvas id="game"></canvas>
    </div>

    <div id="right-panel">
      <div class="panel-section">
        <div class="panel-title">📖 상세 정보</div>
        <div id="info-box">
          <div id="info-content">배치할 포탑이나 함정을 선택하세요.</div>
          <div id="action-buttons" style="display:none;">
            <button id="sel-repair-btn" onclick="repairSelected()">🔨 수리하기</button>
            <button id="sel-sell-btn" onclick="sellSelected()">💸 철거</button>
          </div>
        </div>
      </div>

      <div class="panel-section">
        <div class="panel-title">🗼 터렛 (Max 12)</div>
        <div class="turret-grid" id="turret-grid"></div>
      </div>
      <div class="panel-section">
        <div class="panel-title">🪤 함정</div>
        <div class="trap-grid" id="trap-grid"></div>
      </div>
      <div class="panel-section">
        <div class="panel-title">⚗️ 업그레이드 (고대핵)</div>
        <div id="upgrade-list"></div>
      </div>
    </div>
  </div>

  <div id="bottombar">
    <div id="msg-log">게임을 시작했습니다. 포탑을 짓고 적을 막아내세요!</div>
  </div>
</div>

<div id="overlay-screen">
  <h2 id="overlay-title">GAME OVER</h2>
  <p id="overlay-msg" style="font-size: 18px;"></p>
  <button class="overlay-btn" onclick="location.reload()">🔄 다시 시작</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// FROZEN LEGACY — Core Engine
// ═══════════════════════════════════════════════════════════

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const canvasWrap = document.getElementById('canvas-wrap');

function resizeCanvas() {
  const r = canvasWrap.getBoundingClientRect();
  canvas.width = r.width;
  canvas.height = r.height;
}
resizeCanvas();

const G = {
  running: false, waveActive: false, gameOver: false,
  wave: 0, speed: 1, gold: 400, core: 0,
  castleHp: 1000, castleMaxHp: 1000,
  maxTurrets: 12,
  selected: null, // {type, id, c, r, isTrap}
  turrets: [], enemies: [], traps: [], 
  projectiles: [], particles: [], floatingTexts: [],
  upgrades: { maxDurability: 0, repairCost: 0, mineChain: 0 },
  blizzard: false
};

let COLS, ROWS, CELL;
let grid = []; 
let path = [];

function buildGrid() {
  resizeCanvas();
  CELL = 50;
  COLS = Math.floor(canvas.width / CELL);
  ROWS = Math.floor(canvas.height / CELL);
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  
  path = [];
  let r = Math.floor(ROWS/4), c = 0;
  while(c < COLS * 0.7) { grid[r][c]=1; path.push({c,r}); c++; }
  while(r < ROWS * 0.7) { grid[r][c]=1; path.push({c,r}); r++; }
  while(c < COLS - 2) { grid[r][c]=1; path.push({c,r}); c++; }
  
  grid[r][c] = 2; grid[r-1][c] = 2; grid[r][c+1] = 2; grid[r-1][c+1] = 2;
}

// ✨ 설명(desc) 데이터 추가
const TURRET_DEFS = [
  { id: 'arrow', name: '화살탑', icon: '🏹', cost: 100, dmg: 30, rate: 1.2, range: 4.5, durMax: 100, color: '#8060c0', projSpeed: 400, desc: '가장 기본적인 방어탑. 무난한 사거리와 공격력을 가집니다.' },
  { id: 'gatling', name: '기관총', icon: '🔫', cost: 180, dmg: 15, rate: 4.0, range: 3.5, durMax: 80, color: '#b0c4de', projSpeed: 600, desc: '빠른 연사력으로 다수의 적을 제압하는 데 탁월합니다.' },
  { id: 'sniper', name: '저격수', icon: '🎯', cost: 250, dmg: 100, rate: 0.5, range: 8, durMax: 90, color: '#2a5298', projSpeed: 1000, desc: '아주 긴 사거리에서 치명적인 한 방 공격을 가합니다.' },
  { id: 'flame', name: '화염방사', icon: '🔥', cost: 300, dmg: 40, rate: 2.5, range: 2.8, durMax: 70, color: '#ff4500', projSpeed: 300, isFire: true, desc: '짧은 사거리지만 지속 피해를 줍니다. 얼음 속성 적에게 피해 2배!' }
];

const TRAP_DEFS = [
  { id: 'sticky', name: '점착늪', icon: '🟫', cost: 60, slow: 0.5, desc: '경로 위에 설치하며, 밟은 적의 이동 속도를 일시적으로 절반으로 낮춥니다.' },
  { id: 'mine', name: '마력지뢰', icon: '💣', cost: 150, dmg: 300, range: 2, desc: '경로 위에 설치. 적이 닿으면 폭발하여 주변 범위 내 강력한 피해를 줍니다.' }
];

const ENEMY_TYPES = {
  goblin: { name:'고블린', icon:'👺', weapon:'🗡️', hp:60, spd:1.2, reward:5 },
  orc: { name:'오크', icon:'👹', weapon:'🪓', hp:200, spd:0.8, reward:12 },
  ice_wolf: { name:'얼음늑대', icon:'🐺', weapon:'🧊', hp:150, spd:1.8, reward:15, ice:true },
  ancient: { name:'고대룡', icon:'🐉', weapon:'🔮', hp:15000, spd:0.6, reward:1000, boss:true, ice:true }
};

const UPGRADE_DEFS = [
  { id:'maxDurability', name:'내구도 강화', cost:1, desc:'터렛 체력 +20%' },
  { id:'mineChain', name:'지뢰 강화', cost:1, desc:'지뢰 폭발 범위 +20%' }
];

// ═══════════════════════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════════════════════

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  buildGrid();
  renderUI();
  G.running = true;
  requestAnimationFrame(gameLoop);
}

function startWave() {
  if (G.waveActive) return;
  G.wave++;
  G.waveActive = true;
  G.blizzard = G.wave >= 70;
  log(`웨이브 ${G.wave} 시작!`);
  
  let count = 5 + G.wave * 2;
  let spawned = 0;
  let interval = setInterval(() => {
    let type = 'goblin';
    if (G.wave > 5 && Math.random() > 0.7) type = 'orc';
    if (G.wave > 20 && Math.random() > 0.8) type = 'ice_wolf';
    if (G.wave === 100 && spawned === 0) type = 'ancient';
    
    spawnEnemy(type);
    spawned++;
    if (spawned >= count) clearInterval(interval);
  }, 1000 / G.speed);
}

function spawnEnemy(typeId) {
  const def = ENEMY_TYPES[typeId];
  const hp = def.hp * (1 + G.wave * 0.1);
  G.enemies.push({
    ...def, hp, maxHp: hp, 
    x: path[0].c * CELL + CELL/2, y: path[0].r * CELL + CELL/2,
    pathIdx: 0, slowTimer: 0, dead: false
  });
}

function createParticles(x, y, color, count) {
  for(let i=0; i<count; i++) {
    G.particles.push({
      x, y, vx: (Math.random() - 0.5) * 200, vy: (Math.random() - 0.5) * 200,
      life: 0.4 + Math.random() * 0.3, color: color, size: Math.random() * 4 + 2
    });
  }
}

function createFloatingText(x, y, text, color, life = 1.0, floatSpeed = 40) {
  G.floatingTexts.push({ x, y, text, color, life, maxLife: life, floatSpeed });
}

function update(dt) {
  if (!G.running || G.gameOver) return;

  G.enemies.forEach(e => {
    if (e.dead) return;
    let speed = e.spd * CELL * dt;
    if (e.slowTimer > 0) { speed *= 0.5; e.slowTimer -= dt; }
    
    let target = path[e.pathIdx + 1];
    if (!target) {
      G.castleHp -= e.boss ? 500 : 50;
      e.dead = true;
      updateCastleUI();
      if (G.castleHp <= 0) endGame(false);
      return;
    }
    
    let tx = target.c * CELL + CELL/2, ty = target.r * CELL + CELL/2;
    let dx = tx - e.x, dy = ty - e.y;
    let dist = Math.hypot(dx, dy);
    
    if (dist < speed) {
      e.x = tx; e.y = ty; e.pathIdx++; checkTraps(e);
    } else {
      e.x += (dx/dist) * speed; e.y += (dy/dist) * speed;
    }
  });
  G.enemies = G.enemies.filter(e => !e.dead);

  G.turrets.forEach(t => {
    if (t.durability <= 0) return;
    t.cooldown -= dt;
    if (G.blizzard) t.durability -= dt * 0.5;

    let cx = t.c*CELL + CELL/2, cy = t.r*CELL + CELL/2;
    let target = G.enemies.find(e => Math.hypot(e.x - cx, e.y - cy) < t.range * CELL);
    if (target) {
      t.angle = Math.atan2(target.y - cy, target.x - cx);
      if (t.cooldown <= 0) {
        t.cooldown = 1 / t.rate;
        let dmg = t.dmg;
        if (t.isFire && target.ice) dmg *= 2;
        G.projectiles.push({
          x: cx, y: cy, target: target, lastTx: target.x, lastTy: target.y,
          speed: t.projSpeed, dmg: dmg, color: t.color, isFire: t.isFire
        });
        t.durability -= 0.2;
      }
    }
  });

  G.projectiles.forEach(p => {
    if (p.dead) return;
    let tx = p.target.dead ? p.lastTx : p.target.x;
    let ty = p.target.dead ? p.lastTy : p.target.y;
    if (!p.target.dead) { p.lastTx = tx; p.lastTy = ty; }

    let dx = tx - p.x, dy = ty - p.y;
    let dist = Math.hypot(dx, dy);
    let move = p.speed * dt;

    if (dist < move) {
      p.dead = true;
      createParticles(tx, ty, p.color, p.isFire ? 8 : 4);
      if (!p.target.dead) {
        p.target.hp -= p.dmg;
        createFloatingText(tx + Math.random()*20-10, ty - 10, Math.round(p.dmg), '#ffaaaa', 0.6, 30);
        if (p.target.hp <= 0) {
          p.target.dead = true;
          G.gold += p.target.reward;
          if (p.target.boss) { G.core += 2; endGame(true); }
          createParticles(tx, ty, '#ff3333', 15); 
          createFloatingText(tx, ty - 25, `+${p.target.reward}💰`, '#ffe060', 1.0, 50);
          updateUI();
        }
      }
    } else {
      p.x += (dx/dist) * move; p.y += (dy/dist) * move;
      if (p.isFire) createParticles(p.x, p.y, p.color, 1);
    }
  });
  G.projectiles = G.projectiles.filter(p => !p.dead);

  G.particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt; });
  G.particles = G.particles.filter(p => p.life > 0);

  G.floatingTexts.forEach(ft => { ft.y -= ft.floatSpeed * dt; ft.life -= dt; });
  G.floatingTexts = G.floatingTexts.filter(ft => ft.life > 0);

  if (G.waveActive && G.enemies.length === 0) {
    G.waveActive = false;
    log(`웨이브 ${G.wave} 완료! 포탑을 정비하세요.`, 'good');
  }
}

function checkTraps(e) {
  G.traps.forEach((t, idx) => {
    if (t.c === Math.floor(e.x/CELL) && t.r === Math.floor(e.y/CELL)) {
      if (t.id === 'sticky') e.slowTimer = 2;
      if (t.id === 'mine') {
        explodeMine(t);
        G.traps.splice(idx, 1);
      }
    }
  });
}

function explodeMine(mine) {
  let range = mine.range * CELL * (1 + G.upgrades.mineChain * 0.2);
  let mx = mine.c*CELL+CELL/2, my = mine.r*CELL+CELL/2;
  createParticles(mx, my, '#ffaa00', 30);
  
  G.enemies.forEach(e => {
    let d = Math.hypot(e.x - mx, e.y - my);
    if (d < range) {
      e.hp -= mine.dmg;
      createFloatingText(e.x, e.y, mine.dmg, '#ffaaaa', 0.6);
      if (e.hp <= 0 && !e.dead) { 
        e.dead = true; G.gold += e.reward; 
        createParticles(e.x, e.y, '#ff3333', 15);
        createFloatingText(e.x, e.y - 25, `+${e.reward}💰`, '#ffe060', 1.0);
      }
    }
  });
  updateUI();
}

// ═══════════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════════

function gameLoop(now) {
  let dt = 0.016 * G.speed;
  update(dt);
  draw(now);
  requestAnimationFrame(gameLoop);
}

function draw(now) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  ctx.fillStyle = '#1a2538';
  path.forEach(p => ctx.fillRect(p.c * CELL, p.r * CELL, CELL, CELL));
  
  ctx.fillStyle = '#2a4a80';
  for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) if(grid[r][c]===2) ctx.fillRect(c*CELL, r*CELL, CELL, CELL);

  G.traps.forEach(t => {
    ctx.font = '22px Arial'; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(TRAP_DEFS.find(d=>d.id===t.id).icon, t.c*CELL+CELL/2, t.r*CELL+CELL/2);
  });

  G.turrets.forEach(t => {
    let cx = t.c*CELL + CELL/2, cy = t.r*CELL + CELL/2;
    ctx.fillStyle = '#111828';
    ctx.beginPath(); ctx.arc(cx, cy, CELL/2.5, 0, Math.PI*2); ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = t.color; ctx.stroke();
    
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(t.angle || 0); ctx.fillStyle = t.color;
    if (t.defId === 'flame') { ctx.fillRect(0, -6, 22, 12); }
    else if (t.defId === 'sniper') { ctx.fillRect(0, -3, 30, 6); }
    else { ctx.fillRect(0, -4, 20, 8); }
    ctx.restore();

    ctx.font = '16px Arial'; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(TURRET_DEFS.find(d=>d.id===t.defId).icon, cx, cy);

    ctx.fillStyle = '#222'; ctx.fillRect(t.c*CELL+5, t.r*CELL+CELL-8, CELL-10, 4);
    ctx.fillStyle = t.durability < 30 ? '#ff4040' : '#40c0ff';
    ctx.fillRect(t.c*CELL+5, t.r*CELL+CELL-8, (t.durability/t.durMax)*(CELL-10), 4);
  });

  G.enemies.forEach(e => {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.ellipse(e.x, e.y + 12, 12, 6, 0, 0, Math.PI*2); ctx.fill();
    ctx.font = '28px Arial'; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(e.icon, e.x, e.y);
    let bob = Math.sin((now || 0) / 150) * 4;
    ctx.font = '18px Arial'; ctx.fillText(e.weapon, e.x + 14, e.y + bob);

    let barW = 30, barH = 4;
    ctx.fillStyle = '#222'; ctx.fillRect(e.x-barW/2, e.y-22, barW, barH);
    ctx.fillStyle = e.hp/e.maxHp < 0.3 ? '#ff3333' : '#33ff33';
    ctx.fillRect(e.x-barW/2, e.y-22, (e.hp/e.maxHp)*barW, barH);
  });

  G.projectiles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.isFire ? 5 : 3, 0, Math.PI*2); ctx.fill();
  });

  G.particles.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life * 2); ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1.0;

  G.floatingTexts.forEach(ft => {
    ctx.globalAlpha = Math.max(0, ft.life / ft.maxLife);
    ctx.font = 'bold 16px Cinzel, Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.strokeText(ft.text, ft.x, ft.y);
    ctx.fillStyle = ft.color; ctx.fillText(ft.text, ft.x, ft.y);
  });
  ctx.globalAlpha = 1.0;
  
  if (G.blizzard) {
    ctx.fillStyle = 'rgba(200, 230, 255, 0.15)'; ctx.fillRect(0,0,canvas.width, canvas.height);
  }
}

// ═══════════════════════════════════════════════════════════
// UI & INTERACTION
// ═══════════════════════════════════════════════════════════

canvas.addEventListener('mousedown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const c = Math.floor((e.clientX - rect.left) / CELL);
  const r = Math.floor((e.clientY - rect.top) / CELL);
  
  if (G.selected && G.selected.type === 'build') {
    if (grid[r][c] === 0 && !G.selected.isTrap) {
      if (G.turrets.length >= G.maxTurrets) { log(`포탑 최대 개수(${G.maxTurrets}) 도달!`, 'warn'); return; }
      const def = TURRET_DEFS.find(d => d.id === G.selected.id);
      if (G.gold >= def.cost) {
        G.gold -= def.cost;
        G.turrets.push({ ...def, defId: def.id, c, r, durability: def.durMax, cooldown: 0, angle: 0 });
        grid[r][c] = 3;
        clearSelection();
        updateUI();
      } else log('골드가 부족합니다!', 'warn');
    } else if (grid[r][c] === 1 && G.selected.isTrap) {
      const def = TRAP_DEFS.find(d => d.id === G.selected.id);
      if (G.gold >= def.cost) {
        G.gold -= def.cost;
        G.traps.push({ ...def, c, r });
        clearSelection();
        updateUI();
      } else log('골드가 부족합니다!', 'warn');
    } else {
        clearSelection();
    }
  } else {
    const t = G.turrets.find(t => t.c === c && t.r === r);
    if (t) {
      G.selected = { type: 'turret', ...t };
      showBuiltTurretInfo(t);
    } else {
      clearSelection();
    }
  }
});

// ✨ 신규: 배치 전 아이템 설명창 띄우기
function selectToBuild(def, isTrap) {
  G.selected = { type: 'build', id: def.id, isTrap: isTrap };
  
  document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('btn-' + def.id).classList.add('selected');
  
  let statsHTML = isTrap 
    ? `<span style="color:var(--gold)">비용: ${def.cost}💰</span>` 
    : `<span style="color:var(--gold)">비용: ${def.cost}💰</span> | 공격력: ${def.dmg} | 사거리: ${def.range}`;
    
  document.getElementById('info-content').innerHTML = `
    <div style="font-size: 14px; font-weight: bold; color: var(--ice-bright); margin-bottom: 5px;">${def.icon} ${def.name}</div>
    <div style="margin-bottom: 6px; font-weight:bold;">${statsHTML}</div>
    <div style="color: #8da3c0;">${def.desc}</div>
  `;
  document.getElementById('action-buttons').style.display = 'none';
}

// ✨ 신규: 이미 설치된 포탑 설명창 띄우기
function showBuiltTurretInfo(t) {
  document.getElementById('info-content').innerHTML = `
    <div style="font-size: 14px; font-weight: bold; color: var(--gold-bright); margin-bottom: 5px;">${t.icon} ${t.name} (배치됨)</div>
    <div style="margin-bottom: 4px; color: var(--text-main);">내구도: <span style="color:${t.durability<30?'var(--hp-red)':'var(--hp-green)'}">${Math.round(t.durability)}</span> / ${t.durMax}</div>
    <div style="color: var(--text-dim);">수리 비용: ${Math.round((t.durMax - t.durability) * 0.5)}💰</div>
  `;
  document.getElementById('action-buttons').style.display = 'block';
}

// 선택 취소 및 정보창 초기화
function clearSelection() {
  G.selected = null;
  document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('info-content').innerHTML = `배치할 포탑이나 함정을 선택하세요.`;
  document.getElementById('action-buttons').style.display = 'none';
}

function renderUI() {
  const tg = document.getElementById('turret-grid');
  TURRET_DEFS.forEach(d => {
    const b = document.createElement('div');
    b.className = 'item-btn';
    b.id = 'btn-' + d.id;
    b.innerHTML = `<span class="t-icon">${d.icon}</span><span class="t-name">${d.name}</span><span class="t-cost">${d.cost}💰</span>`;
    b.onclick = () => selectToBuild(d, false);
    tg.appendChild(b);
  });
  
  const trg = document.getElementById('trap-grid');
  TRAP_DEFS.forEach(d => {
    const b = document.createElement('div');
    b.className = 'item-btn';
    b.id = 'btn-' + d.id;
    b.innerHTML = `<span class="t-icon">${d.icon}</span><span class="t-name">${d.name}</span><span class="t-cost">${d.cost}💰</span>`;
    b.onclick = () => selectToBuild(d, true);
    trg.appendChild(b);
  });

  const upg = document.getElementById('upgrade-list');
  UPGRADE_DEFS.forEach(d => {
    const b = document.createElement('button');
    b.className = 'upgrade-btn';
    b.innerHTML = `<b>${d.name}</b><br><span style="color:var(--text-dim)">${d.desc} (💎${d.cost})</span>`;
    b.onclick = () => buyUpgrade(d.id, d.cost);
    upg.appendChild(b);
  });
}

function buyUpgrade(id, cost) {
  if (G.core >= cost) {
    G.core -= cost;
    G.upgrades[id]++;
    log('업그레이드 완료!', 'good');
    updateUI();
  } else log('고대핵이 부족합니다!', 'warn');
}

function repairSelected() {
  if (G.selected && G.selected.type === 'turret') {
    const t = G.turrets.find(tt => tt.c === G.selected.c && tt.r === G.selected.r);
    const cost = Math.round((t.durMax - t.durability) * 0.5);
    if (G.gold >= cost) {
      G.gold -= cost;
      t.durability = t.durMax;
      showBuiltTurretInfo(t);
      log('포탑 수리 완료!');
      updateUI();
    } else log('수리 비용이 부족합니다!', 'warn');
  }
}

function sellSelected() {
  if (G.selected && G.selected.type === 'turret') {
    const idx = G.turrets.findIndex(tt => tt.c === G.selected.c && tt.r === G.selected.r);
    G.gold += Math.floor(G.turrets[idx].cost / 2);
    grid[G.selected.r][G.selected.c] = 0;
    G.turrets.splice(idx, 1);
    clearSelection();
    updateUI();
    log('철거 완료! 일부 골드를 돌려받았습니다.');
  }
}

function updateUI() {
  document.getElementById('stat-gold').innerText = Math.floor(G.gold);
  document.getElementById('stat-core').innerText = G.core;
  document.getElementById('wave-num').innerText = G.wave;
  
  const turretsDisplay = document.getElementById('stat-turrets');
  turretsDisplay.innerText = `${G.turrets.length}/${G.maxTurrets}`;
  turretsDisplay.style.color = G.turrets.length >= G.maxTurrets ? 'var(--hp-red)' : 'var(--gold)';
}

function updateCastleUI() {
  const p = (G.castleHp / G.castleMaxHp) * 100;
  document.getElementById('castle-hp-bar').style.width = p + '%';
  document.getElementById('castle-hp-text').innerText = Math.max(0, Math.round(p)) + '%';
}

function toggleSpeed() {
  G.speed = G.speed === 1 ? 2 : 1;
  document.getElementById('speed-btn').innerText = `⏩ ${G.speed}×`;
}

function log(m, type) {
  const l = document.getElementById('msg-log');
  l.innerText = m;
  l.style.color = type === 'warn' ? '#ff6060' : type === 'good' ? '#60ff60' : 'var(--ice)';
}

function endGame(win) {
  G.running = false;
  const s = document.getElementById('overlay-screen');
  s.classList.add('show');
  document.getElementById('overlay-title').innerText = win ? "VICTORY" : "GAME OVER";
  document.getElementById('overlay-title').className = win ? "win" : "lose";
  document.getElementById('overlay-msg').innerText = win ? "고대룡을 물리치고 왕국을 구했습니다!" : "성이 함락되었습니다...";
}
</script>
